name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run tests
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Package app
        run: ./script/package_release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-meter-macos
          path: |
            dist/release/*.zip
            dist/release/*.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            dist/release/*.zip \
            dist/release/*.sha256 \
            --title "Codex Usage Meter $version" \
            --notes "See CHANGELOG.md for changes. Release artifacts are ad-hoc signed and not notarized."
